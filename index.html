        return <svg viewBox="0 0 24 24" style={style}><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1 1 0 0 0 .2 1.1l.1.1a2 2 0 0 1-2.8 2.8l-.1-.1a1 1 0 0 0-1.1-.2 1 1 0 0 0-.6.9V20a2 2 0 0 1-4 0v-.2a1 1 0 0 0-.7-.9 1 1 0 0 0-1.1.2l-.1.1a2 2 0 0 1-2.8-2.8l.1-.1a1 1 0 0 0 .2-1.1 1 1 0 0 0-.9-.6H4a2 2 0 0 1 0-4h.2a1 1 0 0 0 .9-.7 1 1 0 0 0-.2-1.1l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1 1 0 0 0 1.1.2h.1a1 1 0 0 0 .6-.9V4a2 2 0 0 1 4 0v.2a1 1 0 0 0 .6.9 1 1 0 0 0 1.1-.2l.1-.1a2 2 0 0 1 2.8 2.8l-.1.1a1 1 0 0 0-.2 1.1v.1a1 1 0 0 0 .9.6H20a2 2 0 0 1 0 4h-.2a1 1 0 0 0-.9.6z" /></svg>;

      function pageLive() {

                    <li key={evt.id} className={`event-item ${evt.id === lastEventId ? "new" : ""}`}>
                      <div className="event-row">
                        <span className={`badge ${evt.type}`}>{evt.type}</span>
                        <span className="mono" style={{ color: "var(--muted)", fontSize: "0.8rem" }}>{evt.time}</span>
                      </div>
                      <div>{evt.message}</div>
                    </li>
                  ))}
                </ul>
              )}
            </div>
          </div>
        );
      }

      function pageRoute() {
        const safeRoute = mapSimulatedRoutes.find((route) => safestSimRoute && route.id === safestSimRoute.id) || mapSimulatedRoutes[0] || null;
        return (
          <div className="page" key="route">
            <div className="card">
              <h2 style={{ marginBottom: 4 }}>Route Navigator</h2>
              <div style={{ color: "var(--muted)", fontSize: "0.86rem" }}>Enter start and destination, compare simulated routes by obstacle density, and automatically follow the safest route.</div>
            </div>

            <div className="card">
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8, marginBottom: 12, flexWrap: "wrap" }}>
                <h3 style={{ margin: 0 }}>Location-based Smart Navigation</h3>
                <button
                  className="btn"
                  onClick={resolveNavigatorLocations}
                  disabled={navResolving}
                >
                  {navResolving ? "Resolving..." : "Find Routes"}
                </button>
              </div>

              <div className="grid-2" style={{ marginBottom: 12 }}>
                <div className="slider-row" style={{ marginBottom: 0 }}>
                  <label>
                    <span>Starting Coordinate</span>
                  </label>
                  <input
                    className="voice-select"
                    type="text"
                    value={navStartName}
                    onChange={(e) => {
                      setNavStartName(e.target.value);
                      setNavStartCoord(parseCoordinateInput(e.target.value));
                    }}
                    placeholder="18.530309,73.867644"
                  />
                </div>
                <div className="slider-row" style={{ marginBottom: 0 }}>
                  <label>
                    <span>Ending Coordinate</span>
                  </label>
                  <input
                    className="voice-select"
                    type="text"
                    value={navEndName}
                    onChange={(e) => {
                      setNavEndName(e.target.value);
                      setNavEndCoord(parseCoordinateInput(e.target.value));
                    }}
                    placeholder="18.529364,73.858585"
                  />
                </div>
              </div>

              {navError && (
                <div style={{ color: "#fca5a5", border: "1px solid rgba(239,68,68,0.35)", borderRadius: 10, padding: 10, marginBottom: 12 }}>
                  {navError}
                </div>
              )}

              {navStartCoord && navEndCoord && (
                <div style={{ color: "var(--muted)", fontSize: "0.86rem", marginBottom: 12 }}>
                  Start: <span className="mono">{navStartCoord.lat.toFixed(6)}, {navStartCoord.lng.toFixed(6)}</span> | Destination: <span className="mono">{navEndCoord.lat.toFixed(6)}, {navEndCoord.lng.toFixed(6)}</span>
                </div>
              )}

              <div style={{ color: "var(--muted)", fontSize: "0.86rem", marginBottom: 12 }}>
                System compares 4 possible routes between the same start and destination and auto-selects the safest one using minimum obstacle and water pothole count.
              </div>

              <div className="table-wrap" style={{ marginBottom: 12 }}>
                <table>
                  <thead>
                    <tr>
                      <th>Route</th>
                      <th>Obstacle Count</th>
                      <th>Water Potholes</th>
                      <th>Distance</th>
                      <th>Estimated Time</th>
                      <th>Status</th>
                    </tr>
                  </thead>
                  <tbody>
                    {simulatedRoutes.map((route) => {
                      const isSafest = safestSimRoute && route.id === safestSimRoute.id;
                      const totalHazards = Number(route.hazardTotal ?? (route.obstacleCount + route.waterPotholesCount));
                      return (
                        <tr key={route.id}>
                          <td>{route.name} {route.routeType ? <span style={{ color: "#9ca3af", fontSize: "0.76rem" }}>({route.routeType})</span> : null}</td>
                          <td className="mono">{route.obstacleCount}</td>
                          <td className="mono">{route.waterPotholesCount}</td>
                          <td>{route.totalDistance}</td>
                          <td>{route.estimatedTime}</td>
                          <td>
                            <span className={`badge ${isSafest ? "water" : "obstacle"}`}>
                              {isSafest ? `Safest Route Selected (${totalHazards} hazards)` : `Alternative (${totalHazards} hazards)`}
                            </span>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>

              <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                <strong>Selected Safe Path:</strong>
                <span className="badge water">{safestSimRoute ? `${safestSimRoute.name} • ${safestSimRoute.obstacleCount} obstacles • ${safestSimRoute.waterPotholesCount} water potholes` : "No route available"}</span>
                {safestSimRoute && (
                  <span style={{ color: "#86efac", fontSize: "0.84rem" }}>
                    Why safest: lowest combined hazards ({safestSimRoute.hazardTotal}) among all options.
                  </span>
                )}
                <button
                  className="btn"
                  onClick={() => {
                    if (!safestSimRoute) return;
                    const message = `The safest route from ${navStartName} to ${navEndName} has been selected. Please follow ${safestSimRoute.name}.`;
                    console.log(`[Route Navigator] ${message}`);
                    if (voiceEnabled && speechSupported && typeof speakText === "function") {
                      speakText(message, { priority: "medium", rate: 0.92, pitch: 1.02 });
                    }
                  }}
                  disabled={!safestSimRoute}
                >
                  Announce Safest Route
                </button>
              </div>
            </div>

            <div className="card">
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8, marginBottom: 10, flexWrap: "wrap" }}>
                <h3>{safeRoute ? `${safeRoute.name} Timeline` : "No route selected"}</h3>
                <button className="btn primary" onClick={speakSessionSummary} disabled={!voiceEnabled || !safeRoute || isSpeaking}>
                  {isSpeaking ? "Speaking..." : "Hear Session Summary"}
                </button>
              </div>
              {!voiceEnabled && <div style={{ color: "var(--muted)", marginBottom: 10, fontSize: "0.86rem" }}>Voice announcements are disabled in Settings.</div>}
              {safeRoute ? renderTimeline(safeRoute) : <div style={{ color: "var(--muted)" }}>No route data available.</div>}
            </div>

            <div className="card">
              <h3 style={{ marginBottom: 10 }}>Interactive Route Map</h3>
              <MapView
                routes={mapSimulatedRoutes}
                currentLat={navStartCoord ? navStartCoord.lat : null}
                currentLng={navStartCoord ? navStartCoord.lng : null}
                latestWaypoint={latestWaypoint}
                latestRouteIndex={safestMapIndex}
                isOnline={isOnline}
              />
            </div>
          </div>
        );
      }

      function pageHistory() {
        const rows = sortedHistory();
        return (
          <div className="page" key="history">
            <div className="card" style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10 }}>
              <h2>Session History</h2>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                <button className="btn" onClick={() => setSortDesc((v) => !v)}>Sort by Time: {sortDesc ? "Newest" : "Oldest"}</button>
                <button className="btn primary" onClick={exportCsv} disabled={historyRows.length === 0}>Export CSV</button>
              </div>
            </div>

            <div className="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Time</th>
                    <th>Distance</th>
                    <th>Water</th>
                    <th>Route</th>
                    <th>Waypoint</th>
                  </tr>
                </thead>
                <tbody>
                  {rows.length === 0 && (
                    <tr>
                      <td colSpan="5" style={{ color: "var(--muted)", textAlign: "center" }}>No readings yet.</td>
                    </tr>
                  )}
                  {rows.map((r, idx) => (
                    <tr key={`${r.time}_${idx}`}>
                      <td className="mono">{r.time}</td>
                      <td className={typeof r.distance === "number" && r.distance < obstacleThreshold ? "distance-danger mono" : "mono"}>
                        {typeof r.distance === "number" ? `${Math.round(r.distance)} cm` : "--"}
                      </td>
                      <td>
                        <span className={`badge ${r.water === 1 ? "water" : "obstacle"}`}>{r.water === 1 ? "water" : "dry"}</span>
                      </td>
                      <td>{r.routeName}</td>
                      <td>{r.waypointLabel}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            <div className="small-stats">
              <div className="card">
                <div className="metric-title">Total Obstacles This Session</div>
                <div className="metric-value mono">{sessionObstacles}</div>
              </div>
              <div className="card">
                <div className="metric-title">Total Water Alerts This Session</div>
                <div className="metric-value mono">{sessionWaterAlerts}</div>
              </div>
            </div>
          </div>
        );
      }

      function pageSettings() {
        return (
          <div className="page" key="settings">
            <div className="card">
              <h2 style={{ marginBottom: 12 }}>Settings</h2>

              <div className="slider-row">
                <label>
                  <span>Obstacle Alert Threshold</span>
                  <span className="mono">{obstacleThreshold} cm</span>
                </label>
                <input type="range" min="20" max="200" value={obstacleThreshold} onChange={(e) => setObstacleThreshold(Number(e.target.value))} />
              </div>

              <div className="slider-row">
                <label>
                  <span>Water Sensor Threshold</span>
                  <span className="mono">{waterThreshold}</span>
                </label>
                <input type="range" min="500" max="3500" value={waterThreshold} onChange={(e) => setWaterThreshold(Number(e.target.value))} />
              </div>

              <div className="toggle-row">
                <span>Enable buzzer alerts simulation</span>
                <button className={`switch ${buzzerEnabled ? "on" : ""}`} onClick={() => setBuzzerEnabled((v) => !v)} aria-label="toggle buzzer simulation"></button>
              </div>

              <div className="toggle-row">
                <span>Enable voice announcements</span>
                <button className={`switch ${voiceEnabled ? "on" : ""}`} onClick={() => setVoiceEnabled((v) => !v)} aria-label="toggle voice announcements"></button>
              </div>

              <div className="voice-section">
                <h3 style={{ margin: 0 }}>Voice Assistant</h3>

                {!speechSupported && (
                  <div style={{ color: "#fca5a5", fontSize: "0.86rem" }}>
                    Voice API is not supported in this browser. Use Chrome or Edge.
                  </div>
                )}

                {speechSupported && !voicePrimed && (
                  <div style={{ color: "#fde68a", fontSize: "0.86rem" }}>
                    Tap Enable Audio once to unlock browser voice output.
                  </div>
                )}

                <div className="voice-actions">
                  <button className="btn" onClick={primeVoiceEngine} disabled={!voiceEnabled || !speechSupported || voicePrimed}>{voicePrimed ? "Audio Enabled" : "Enable Audio"}</button>
                  <button className="btn primary" onClick={speakTestVoice} disabled={!voiceEnabled || !speechSupported}>Test Voice</button>
                  <button className="btn" onClick={() => speakDashboardDescription(activePage)} disabled={!voiceEnabled || !voicePrimed || !speechSupported}>Speak Current Page</button>
                  <button className="btn" onClick={cancelSpeech} disabled={!isSpeaking}>Stop Speech</button>
                </div>

                <div className="slider-row" style={{ marginBottom: 0 }}>
                  <label>
                    <span>Speech Rate</span>
                    <span className="mono">{voiceRate.toFixed(1)}</span>
                  </label>
                  <select className="voice-select" value={voiceRate} onChange={(e) => setVoiceRate(Number(e.target.value))} disabled={!voiceEnabled}>
                    <option value={0.7}>Slow (0.7)</option>
                    <option value={0.9}>Normal (0.9)</option>
                    <option value={1.1}>Fast (1.1)</option>
                  </select>
                </div>
              </div>

              <div className="buzzer-indicator">
                <span>Buzzer state</span>
                <span className={`buzzer-light ${(buzzerEnabled && buzzerFlash) ? "active" : ""}`}></span>
              </div>
            </div>

            <div className="card">
              <h3 style={{ marginBottom: 10 }}>Connection Status</h3>
              <div className="conn-grid">
                <div>Server URL: <span className="mono">{SERVER_URL}</span></div>
                <div>Last ping time: <span className="mono">{lastPing}</span></div>
                <div>Status: <span style={{ color: isOnline ? "#86efac" : "#fca5a5" }}>{isOnline ? "Connected" : "Offline"}</span></div>
                <div>
                  <button className="btn primary" onClick={manualReconnect}>Manual Reconnect</button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      let pageContent = pageLive();
      if (activePage === "route") pageContent = pageRoute();
      if (activePage === "history") pageContent = pageHistory();
      if (activePage === "settings") pageContent = pageSettings();

      return (
        <div className="app-shell">
          <aside className="sidebar">
            <div className="brand">
              <div className="brand-title">Smart Assistive Blind Stick</div>
              <div className="brand-sub">IoT dashboard for live mobility assistance</div>
              <div className="server-pill">
                <span className={`dot ${isOnline ? "" : "offline"}`}></span>
                <span>{isOnline ? "Server reachable" : "Server offline"}</span>
              </div>
            </div>

            <nav className="nav">
              {pages.map((p) => (
                <button
                  key={p.id}
                  className={`nav-item ${activePage === p.id ? "active" : ""} ${(p.id === "live" && livePulse) ? "live-pulse" : ""}`}
                  onClick={() => setActivePage(p.id)}
                >
                  <NavIcon name={p.id} />
                  <span>{p.label}</span>
                </button>
              ))}
            </nav>
          </aside>

          <main className="main">{pageContent}</main>

          <div className="mobile-tabs">
            {pages.map((p) => (
              <button key={p.id} className={`mobile-tab ${activePage === p.id ? "active" : ""}`} onClick={() => setActivePage(p.id)}>
                <NavIcon name={p.id} />
                <span>{p.label.split(" ")[0]}</span>
              </button>
            ))}
          </div>

          <button className={`voice-fab ${isSpeaking ? "speaking" : ""}`} onClick={() => speakDashboardDescription(activePage)} aria-label="Speak current page">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 14.5a3.5 3.5 0 0 0 3.5-3.5V6.5a3.5 3.5 0 0 0-7 0V11a3.5 3.5 0 0 0 3.5 3.5Zm6-3.5a1 1 0 0 0-2 0 4 4 0 0 1-8 0 1 1 0 0 0-2 0 6 6 0 0 0 5 5.91V20h-2a1 1 0 0 0 0 2h6a1 1 0 0 0 0-2h-2v-3.09A6 6 0 0 0 18 11Z" />
            </svg>
          </button>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
